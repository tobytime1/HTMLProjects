<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自定义 Tier Maker 排行榜</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#165DFF',
          },
        },
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .content-auto {
        content-visibility: auto;
      }
      .square-item {
        aspect-ratio: 1/1;
        @apply flex items-center justify-center text-center font-bold rounded cursor-move shadow-md transition-all duration-200 hover:scale-105;
        word-break: break-all;
        white-space: pre-wrap;
        overflow: hidden;
        padding: 4px;
        font-size: clamp(10px, 2vw, 14px);
        text-overflow: ellipsis;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .square-item.selected {
        @apply ring-4 ring-blue-500;
      }
      .tier-row {
        @apply flex min-h-[70px] md:min-h-[90px] w-full bg-gray-100 dark:bg-gray-800 rounded-lg mb-2 overflow-hidden;
      }
      .tier-label {
        @apply w-16 md:w-20 flex items-center justify-center font-bold text-white text-lg cursor-pointer;
      }
      .tier-items {
        @apply flex flex-wrap gap-2 p-3 flex-1 items-center;
      }
      .color-option {
        @apply w-8 h-8 rounded-full cursor-pointer transition-all hover:scale-110 border-2 border-transparent;
      }
      .color-option.active {
        @apply border-white ring-2 ring-offset-2 ring-black;
      }
    }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 transition-colors duration-300">
  <div class="max-w-7xl mx-auto px-4 py-6 pb-20">
    <header class="flex flex-col md:flex-row md:justify-between md:items-center gap-4 mb-6">
      <div class="flex items-center gap-3">
        <h1 class="text-2xl md:text-3xl font-bold text-gray-800 dark:text-white">Tier Maker 排行榜</h1>
        <button id="theme-toggle" class="p-2 rounded-full bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-white">
          <i class="fa fa-moon-o dark:hidden"></i>
          <i class="fa fa-sun-o hidden dark:inline-block"></i>
        </button>
      </div>
      <div class="flex flex-wrap gap-2">
        <button id="toggle-sidebar" class="px-4 py-2 bg-primary text-white rounded-lg shadow hover:bg-primary/90">
          <i class="fa fa-bars mr-1"></i> 编辑面板
        </button>
        <button id="export-image" class="px-4 py-2 bg-green-600 text-white rounded-lg shadow hover:bg-green-700">
          <i class="fa fa-download mr-1"></i> 导出图片
        </button>
        <button id="reset-data" class="px-4 py-2 bg-red-500 text-white rounded-lg shadow hover:bg-red-600">
          <i class="fa fa-trash mr-1"></i> 重置
        </button>
      </div>
    </header>

    <div class="flex flex-col lg:flex-row gap-6">
      <main class="flex-1 order-2 lg:order-1">
        <div id="tier-container" class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow-md transition-all">
        </div>
      </main>

      <aside id="sidebar" class="w-full lg:w-80 bg-white dark:bg-gray-800 p-4 rounded-xl shadow-md order-1 lg:order-2">
        <h2 class="text-xl font-bold text-gray-800 dark:text-white mb-4 flex items-center">
          <i class="fa fa-cogs mr-2 text-primary"></i> 项目编辑
        </h2>

        <div class="mb-6">
          <h3 class="font-semibold text-gray-700 dark:text-gray-300 mb-2">添加新方块</h3>
          <input id="item-text" placeholder="输入文字" class="w-full p-2 border rounded mb-2 dark:bg-gray-700 dark:border-gray-600 dark:text-white">
          <input type="file" id="item-image" accept="image/*" class="w-full p-2 border rounded mb-2 dark:bg-gray-700 dark:border-gray-600">
          <button id="add-item" class="w-full p-2 bg-primary text-white rounded hover:bg-primary/90">
            <i class="fa fa-plus mr-1"></i> 添加到未分类
          </button>
        </div>

        <div class="mb-6">
          <h3 class="font-semibold text-gray-700 dark:text-gray-300 mb-2">等级设置</h3>
          <input id="tier-name" placeholder="等级名称" class="w-full p-2 border rounded mb-2 dark:bg-gray-700 dark:border-gray-600 dark:text-white">
          <div class="grid grid-cols-8 gap-1 mb-2">
          </div>
          <div class="flex gap-2 mb-2">
            <input type="range" id="color-opacity" min="10" max="100" value="100" class="w-full">
            <span id="opacity-value" class="text-sm text-gray-600 dark:text-gray-400">100%</span>
          </div>
          <div class="grid grid-cols-2 gap-2 mb-2">
            <button id="add-tier" class="p-2 bg-green-600 text-white rounded hover:bg-green-700">
              <i class="fa fa-plus mr-1"></i> 添加等级
            </button>
            <button id="delete-tier" class="p-2 bg-red-500 text-white rounded hover:bg-red-600">
              <i class="fa fa-trash mr-1"></i> 删除选中
            </button>
          </div>
          <div class="grid grid-cols-2 gap-2 mt-2">
            <button id="move-tier-up" class="p-2 bg-blue-500 text-white rounded hover:bg-blue-600">
              <i class="fa fa-arrow-up mr-1"></i> 上移
            </button>
            <button id="move-tier-down" class="p-2 bg-blue-500 text-white rounded hover:bg-blue-600">
              <i class="fa fa-arrow-down mr-1"></i> 下移
            </button>
          </div>
        </div>

        <div class="mb-6">
          <h3 class="font-semibold text-gray-700 dark:text-gray-300 mb-2">方块尺寸</h3>
          <div class="flex gap-2 mb-2">
            <input type="number" id="item-size" min="40" max="120" value="60" class="w-full p-2 border rounded dark:bg-gray-700 dark:border-gray-600 dark:text-white">
            <button id="apply-size" class="px-3 bg-primary text-white rounded hover:bg-primary/90">应用</button>
          </div>
          <p class="text-xs text-gray-500 dark:text-gray-400">范围: 40-120px</p>
        </div>

        <div class="mt-6">
          <h3 class="font-semibold text-gray-700 dark:text-gray-300 mb-2">未分类项目</h3>
          <div id="unused-items" class="flex flex-wrap gap-2 p-3 bg-gray-100 dark:bg-gray-700 rounded-lg min-h-[100px]">
          </div>
        </div>
      </aside>
    </div>
  </div>

  <script>
    const tierColors = [
      '#FF3D3D', '#FF5252', '#FF9500', '#FFB74D',
      '#FFCC00', '#FFEB3B', '#34C759', '#4CAF50',
      '#007AFF', '#2196F3', '#5856D6', '#673AB7',
      '#AF52DE', '#9C27B0', '#FF2D55', '#E91E63',
      '#8E8E93', '#9E9E9E', '#607D8B', '#795548',
      '#009688', '#00BCD4', '#8BC34A', '#CDDC39',
      '#FF4081', '#F06292', '#9575CD', '#7986CB',
      '#4FC3F7', '#26C6DA', '#AED581', '#D4E157'
    ];

    let selectedTier = null;
    let selectedColor = tierColors[0];
    let darkMode = localStorage.getItem('darkMode') === 'true';
    let selectedItemId = null;

    let tierData = JSON.parse(localStorage.getItem('tierData')) || {
      tiers: [
        { id: 'S', name: 'S', color: '#FF3D3D', opacity: 1 },
        { id: 'A', name: 'A', color: '#FF9500', opacity: 1 },
        { id: 'B', name: 'B', color: '#FFCC00', opacity: 1 },
        { id: 'C', name: 'C', color: '#34C759', opacity: 1 },
        { id: 'D', name: 'D', color: '#007AFF', opacity: 1 },
        { id: 'F', name: 'F', color: '#8E8E93', opacity: 1 }
      ],
      items: [],
      unusedItems: [],
      itemSize: 60
    };

    let itemSize = tierData.itemSize;

    const tierContainer = document.getElementById('tier-container');
    const unusedItemsContainer = document.getElementById('unused-items');
    const colorOpacity = document.getElementById('color-opacity');
    const opacityValue = document.getElementById('opacity-value');
    const itemSizeInput = document.getElementById('item-size');
    const sidebar = document.getElementById('sidebar');
    const themeToggle = document.getElementById('theme-toggle');

    if (darkMode) document.documentElement.classList.add('dark');

    const colorGrid = document.querySelector('.grid-cols-8');
    tierColors.forEach((color, index) => {
      const colorBtn = document.createElement('div');
      colorBtn.className = 'color-option';
      colorBtn.style.backgroundColor = color;
      colorBtn.dataset.color = color;
      if (index === 0) colorBtn.classList.add('active');
      colorBtn.addEventListener('click', () => {
        document.querySelectorAll('.color-option').forEach(c => c.classList.remove('active'));
        colorBtn.classList.add('active');
        selectedColor = color;
      });
      colorGrid.appendChild(colorBtn);
    });

    function initEvents() {
      themeToggle.addEventListener('click', () => {
        darkMode = !darkMode;
        document.documentElement.classList.toggle('dark');
        localStorage.setItem('darkMode', darkMode);
      });

      document.getElementById('toggle-sidebar').addEventListener('click', () => {
        sidebar.classList.toggle('hidden');
      });

      document.getElementById('add-item').addEventListener('click', addNewItem);

      colorOpacity.addEventListener('input', () => {
        opacityValue.textContent = `${colorOpacity.value}%`;
        if (selectedTier) {
          selectedTier.opacity = colorOpacity.value / 100;
          renderTiers();
          saveData();
        }
      });

      document.getElementById('apply-size').addEventListener('click', () => {
        const size = parseInt(itemSizeInput.value);
        if (size >= 40 && size <= 120) {
          itemSize = size;
          tierData.itemSize = size;
          renderItems();
          saveData();
        }
      });

      document.getElementById('add-tier').addEventListener('click', addNewTier);
      document.getElementById('delete-tier').addEventListener('click', deleteSelectedTier);
      document.getElementById('export-image').addEventListener('click', exportImage);
      document.getElementById('reset-data').addEventListener('click', resetData);

      document.getElementById('move-tier-up').addEventListener('click', moveTierUp);
      document.getElementById('move-tier-down').addEventListener('click', moveTierDown);

      // 键盘删除方块
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Delete' && selectedItemId) {
          deleteItemById(selectedItemId);
        }
      });
    }

    function selectItem(itemId) {
      document.querySelectorAll('.square-item').forEach(el => el.classList.remove('selected'));
      const el = document.querySelector(`[data-item-id="${itemId}"]`);
      if (el) {
        el.classList.add('selected');
        selectedItemId = itemId;
      }
    }

    function deleteItemById(itemId) {
      tierData.items = tierData.items.filter(i => i.id !== itemId);
      tierData.unusedItems = tierData.unusedItems.filter(i => i.id !== itemId);
      selectedItemId = null;
      renderItems();
      saveData();
    }

    function moveTierUp() {
      if (!selectedTier) return;
      const idx = tierData.tiers.findIndex(t => t.id === selectedTier.id);
      if (idx > 0) {
        [tierData.tiers[idx], tierData.tiers[idx - 1]] = [tierData.tiers[idx - 1], tierData.tiers[idx]];
        renderTiers();
        saveData();
      }
    }

    function moveTierDown() {
      if (!selectedTier) return;
      const idx = tierData.tiers.findIndex(t => t.id === selectedTier.id);
      if (idx !== -1 && idx < tierData.tiers.length - 1) {
        [tierData.tiers[idx], tierData.tiers[idx + 1]] = [tierData.tiers[idx + 1], tierData.tiers[idx]];
        renderTiers();
        saveData();
      }
    }

    function addNewTier() {
      const tierName = document.getElementById('tier-name').value || 'NEW';
      const newTier = {
        id: 'tier_' + Date.now(),
        name: tierName,
        color: selectedColor,
        opacity: colorOpacity.value / 100
      };
      tierData.tiers.push(newTier);
      renderTiers();
      saveData();
      document.getElementById('tier-name').value = '';
    }

    function deleteSelectedTier() {
      if (!selectedTier || tierData.tiers.length <= 1) return;
      const index = tierData.tiers.findIndex(t => t.id === selectedTier.id);
      if (index > -1) {
        tierData.tiers.splice(index, 1);
        selectedTier = null;
        renderTiers();
        saveData();
      }
    }

    function addNewItem() {
      const text = document.getElementById('item-text').value.trim() || '新项目';
      const imageInput = document.getElementById('item-image');

      if (imageInput.files && imageInput.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
          const newItem = {
            id: 'item_' + Date.now(),
            text: text,
            image: e.target.result
          };
          tierData.unusedItems.push(newItem);
          renderUnusedItems();
          saveData();
        };
        reader.readAsDataURL(imageInput.files[0]);
      } else {
        const newItem = {
          id: 'item_' + Date.now(),
          text: text,
          image: null
        };
        tierData.unusedItems.push(newItem);
        renderUnusedItems();
        saveData();
      }
      document.getElementById('item-text').value = '';
      document.getElementById('item-image').value = '';
    }

    function renderTiers() {
      tierContainer.innerHTML = '';
      tierData.tiers.forEach(tier => {
        const row = document.createElement('div');
        row.className = 'tier-row';

        const label = document.createElement('div');
        label.className = 'tier-label';
        label.style.backgroundColor = tier.color;
        label.style.opacity = tier.opacity;
        label.textContent = tier.name;

        label.addEventListener('click', () => {
          selectedTier = tier;
          document.getElementById('tier-name').value = tier.name;
          colorOpacity.value = tier.opacity * 100;
          opacityValue.textContent = `${tier.opacity * 100}%`;
          document.querySelectorAll('.color-option').forEach(c => {
            c.classList.toggle('active', c.dataset.color === tier.color);
          });
          selectedColor = tier.color;
        });

        label.addEventListener('dblclick', () => {
          const newName = prompt('输入新等级名称:', tier.name);
          if (newName && newName.trim()) {
            tier.name = newName.trim();
            renderTiers();
            saveData();
          }
        });

        const itemsContainer = document.createElement('div');
        itemsContainer.className = 'tier-items';
        itemsContainer.dataset.tierId = tier.id;
        enableDragDrop(itemsContainer);

        const tierItems = tierData.items.filter(item => item.tierId === tier.id);
        tierItems.forEach(item => {
          itemsContainer.appendChild(createItemElement(item));
        });

        row.appendChild(label);
        row.appendChild(itemsContainer);
        tierContainer.appendChild(row);
      });
    }

    function createItemElement(item) {
      const itemEl = document.createElement('div');
      itemEl.className = 'square-item';
      itemEl.dataset.itemId = item.id;
      itemEl.style.width = `${itemSize}px`;
      itemEl.style.height = `${itemSize}px`;

      if (item.image) {
        itemEl.style.backgroundImage = `url(${item.image})`;
        itemEl.style.backgroundSize = 'cover';
        itemEl.style.backgroundPosition = 'center';
        itemEl.textContent = '';
      } else {
        itemEl.style.backgroundColor = '#ffffff';
        itemEl.style.color = '#000000';
        itemEl.textContent = item.text;
      }

      itemEl.setAttribute('draggable', true);

      itemEl.addEventListener('click', (e) => {
        e.stopPropagation();
        selectItem(item.id);
      });

      return itemEl;
    }

    function renderUnusedItems() {
      unusedItemsContainer.innerHTML = '';
      tierData.unusedItems.forEach(item => {
        unusedItemsContainer.appendChild(createItemElement(item));
      });
      enableDragDrop(unusedItemsContainer);
    }

    function renderItems() {
      renderTiers();
      renderUnusedItems();
    }

    function enableDragDrop(container) {
      container.addEventListener('dragover', (e) => e.preventDefault());
      container.addEventListener('drop', (e) => {
        e.preventDefault();
        const itemId = e.dataTransfer.getData('itemId');
        const itemEl = document.querySelector(`[data-item-id="${itemId}"]`);
        if (!itemEl) return;

        container.appendChild(itemEl);
        const item = [...tierData.items, ...tierData.unusedItems].find(i => i.id === itemId);
        if (!item) return;

        if (container === unusedItemsContainer) {
          const idxItem = tierData.items.findIndex(i => i.id === itemId);
          if (idxItem > -1) tierData.items.splice(idxItem, 1);
          const idxUnused = tierData.unusedItems.findIndex(i => i.id === itemId);
          if (idxUnused === -1) tierData.unusedItems.push(item);
        } else {
          const idxUnused = tierData.unusedItems.findIndex(i => i.id === itemId);
          if (idxUnused > -1) tierData.unusedItems.splice(idxUnused, 1);
          const idxItem = tierData.items.findIndex(i => i.id === itemId);
          if (idxItem > -1) tierData.items.splice(idxItem, 1);
          item.tierId = container.dataset.tierId;
          tierData.items.push(item);
        }
        saveData();
      });

      container.addEventListener('dragstart', (e) => {
        if (e.target.dataset.itemId) {
          e.dataTransfer.setData('itemId', e.target.dataset.itemId);
        }
      });
    }

    function saveData() {
      localStorage.setItem('tierData', JSON.stringify(tierData));
    }

    function exportImage() {
      const exportContainer = document.createElement('div');
      exportContainer.className = 'p-4 bg-white';
      exportContainer.style.width = tierContainer.offsetWidth + 'px';
      const tierClone = tierContainer.cloneNode(true);
      tierClone.querySelectorAll('.tier-label').forEach(l => l.style.width = '80px');
      exportContainer.appendChild(tierClone);
      document.body.appendChild(exportContainer);

      html2canvas(exportContainer, { backgroundColor: '#fff', scale: 2 }).then(canvas => {
        const link = document.createElement('a');
        link.download = 'tier-maker-排行榜.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
        document.body.removeChild(exportContainer);
      });
    }

    function resetData() {
      if (confirm('确定要重置所有数据吗？此操作不可恢复！')) {
        localStorage.removeItem('tierData');
        location.reload();
      }
    }

    function init() {
      itemSizeInput.value = itemSize;
      initEvents();
      renderItems();
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
