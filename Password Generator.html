<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密码生成器 | Password Generator | パスワードジェネレーター</title>
    <style>
        /* 基础样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.3s ease; /* 全局流畅过渡动画 */
        }

        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #212529;
            --accent-color: #0d6efd;
            --border-color: #dee2e6;
            --toggle-bg: #e9ecef;
            --toggle-btn: #ffffff;
        }

        .dark-mode {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e9ecef;
            --accent-color: #4dabf7;
            --border-color: #343a40;
            --toggle-bg: #343a40;
            --toggle-btn: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* 卡片容器 */
        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
            margin-top: 30px;
            border: 1px solid var(--border-color);
        }

        /* 语言切换 */
        .lang-switch {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
            gap: 10px;
        }

        .lang-btn {
            padding: 5px 10px;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            background-color: var(--card-bg);
            color: var(--text-color);
            cursor: pointer;
            font-size: 14px;
        }

        .lang-btn.active {
            background-color: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        /* 标题 */
        h1 {
            text-align: center;
            margin-bottom: 25px;
            font-size: 24px;
            color: var(--accent-color);
        }

        /* 密码显示框 */
        .password-display {
            position: relative;
            margin-bottom: 20px;
        }

        #password {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--card-bg);
            color: var(--text-color);
            text-align: center;
            letter-spacing: 2px;
            outline: none;
        }

        .copy-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 5px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 14px;
        }

        .copy-btn:hover {
            background-color: #0b5ed7;
        }

        /* 长度选择 */
        .length-control {
            margin-bottom: 20px;
        }

        .length-label {
            display: block;
            margin-bottom: 8px;
            font-size: 16px;
        }

        #length {
            width: 100%;
            accent-color: var(--accent-color);
            cursor: pointer;
        }

        .length-value {
            text-align: center;
            font-size: 18px;
            margin-top: 5px;
            font-weight: bold;
        }

        /* 字符类型选择 */
        .char-options {
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .option-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
        }

        .option-item:hover {
            background-color: rgba(13, 110, 253, 0.05);
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--accent-color);
            cursor: pointer;
        }

        /* 生成按钮 */
        .generate-btn {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .generate-btn:hover {
            background-color: #0b5ed7;
            transform: translateY(-2px);
        }

        .generate-btn:active {
            transform: translateY(0);
        }

        /* 功能区（主题切换+背景上传） */
        .settings {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        /* 暗黑模式切换 */
        .theme-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toggle-switch {
            position: relative;
            width: 50px;
            height: 24px;
            background-color: var(--toggle-bg);
            border-radius: 20px;
            cursor: pointer;
        }

        .toggle-btn {
            position: absolute;
            top: 2px;
            left: 2px;
            width: 20px;
            height: 20px;
            background-color: var(--toggle-btn);
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .dark-mode .toggle-btn {
            left: 28px;
        }

        /* 背景上传 */
        .bg-upload {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #bg-input {
            display: none;
        }

        .upload-btn {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background-color: var(--card-bg);
            color: var(--text-color);
            cursor: pointer;
            font-size: 14px;
        }

        .upload-btn:hover {
            background-color: rgba(13, 110, 253, 0.05);
        }

        /* 提示框 */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            padding: 10px 20px;
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            border-radius: 5px;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 999;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 语言切换 -->
        <div class="lang-switch">
            <button class="lang-btn active" data-lang="zh">中文</button>
            <button class="lang-btn" data-lang="en">English</button>
            <button class="lang-btn" data-lang="jp">日本語</button>
        </div>

        <!-- 标题 -->
        <h1 id="title">密码生成器</h1>

        <!-- 密码显示 -->
        <div class="password-display">
            <input type="text" id="password" readonly placeholder="点击生成密码">
            <button class="copy-btn" id="copyBtn">复制</button>
        </div>

        <!-- 长度选择 -->
        <div class="length-control">
            <label for="length" class="length-label" id="lengthLabel">密码长度：</label>
            <input type="range" id="length" min="1" max="24" value="12">
            <div class="length-value" id="lengthValue">12</div>
        </div>

        <!-- 字符类型选择 -->
        <div class="char-options">
            <div class="option-item">
                <input type="checkbox" id="numbers" checked>
                <label for="numbers" id="numbersLabel">数字 (0-9)</label>
            </div>
            <div class="option-item">
                <input type="checkbox" id="uppercase" checked>
                <label for="uppercase" id="uppercaseLabel">大写字母 (A-Z)</label>
            </div>
            <div class="option-item">
                <input type="checkbox" id="lowercase" checked>
                <label for="lowercase" id="lowercaseLabel">小写字母 (a-z)</label>
            </div>
            <div class="option-item">
                <input type="checkbox" id="symbols">
                <label for="symbols" id="symbolsLabel">特殊符号 (!@#$%^&*)</label>
            </div>
            <div class="option-item">
                <input type="checkbox" id="japanese">
                <label for="japanese" id="japaneseLabel">日语字符 (あ-ん、カ-ン)</label>
            </div>
            <div class="option-item">
                <input type="checkbox" id="chinese">
                <label for="chinese" id="chineseLabel">中文字符 (常用汉字)</label>
            </div>
        </div>

        <!-- 生成按钮 -->
        <button class="generate-btn" id="generateBtn">生成密码</button>

        <!-- 功能设置区 -->
        <div class="settings">
            <!-- 暗黑模式切换 -->
            <div class="theme-toggle">
                <span id="themeText">暗黑模式</span>
                <div class="toggle-switch" id="themeToggle">
                    <div class="toggle-btn"></div>
                </div>
            </div>

            <!-- 背景上传 -->
            <div class="bg-upload">
                <label for="bg-input" class="upload-btn" id="uploadText">上传背景</label>
                <input type="file" id="bg-input" accept="image/*">
            </div>
        </div>
    </div>

    <!-- 提示框 -->
    <div class="toast" id="toast">复制成功！</div>

    <script>
        // 多语言文本配置
        const translations = {
            zh: {
                title: "密码生成器",
                lengthLabel: "密码长度：",
                numbersLabel: "数字 (0-9)",
                uppercaseLabel: "大写字母 (A-Z)",
                lowercaseLabel: "小写字母 (a-z)",
                symbolsLabel: "特殊符号 (!@#$%^&*)",
                japaneseLabel: "日语字符 (あ-ん、カ-ン)",
                chineseLabel: "中文字符 (常用汉字)",
                generateBtn: "生成密码",
                copyBtn: "复制",
                themeText: "暗黑模式",
                uploadText: "上传背景",
                copySuccess: "复制成功！",
                copyFailed: "复制失败！",
                noOptions: "请至少选择一种字符类型！"
            },
            en: {
                title: "Password Generator",
                lengthLabel: "Password Length：",
                numbersLabel: "Numbers (0-9)",
                uppercaseLabel: "Uppercase (A-Z)",
                lowercaseLabel: "Lowercase (a-z)",
                symbolsLabel: "Symbols (!@#$%^&*)",
                japaneseLabel: "Japanese (あ-ん、カ-ン)",
                chineseLabel: "Chinese Characters",
                generateBtn: "Generate Password",
                copyBtn: "Copy",
                themeText: "Dark Mode",
                uploadText: "Upload Background",
                copySuccess: "Copied successfully!",
                copyFailed: "Copy failed!",
                noOptions: "Please select at least one character type!"
            },
            jp: {
                title: "パスワードジェネレーター",
                lengthLabel: "パスワードの長さ：",
                numbersLabel: "数字 (0-9)",
                uppercaseLabel: "大文字 (A-Z)",
                lowercaseLabel: "小文字 (a-z)",
                symbolsLabel: "特殊記号 (!@#$%^&*)",
                japaneseLabel: "日本語文字 (あ-ん、カ-ン)",
                chineseLabel: "中国語文字",
                generateBtn: "パスワードを生成",
                copyBtn: "コピー",
                themeText: "ダークモード",
                uploadText: "背景をアップロード",
                copySuccess: "コピーに成功しました！",
                copyFailed: "コピーに失敗しました！",
                noOptions: "少なくとも1つの文字タイプを選択してください！"
            }
        };

        // DOM元素
        const langBtns = document.querySelectorAll('.lang-btn');
        const title = document.getElementById('title');
        const lengthLabel = document.getElementById('lengthLabel');
        const numbersLabel = document.getElementById('numbersLabel');
        const uppercaseLabel = document.getElementById('uppercaseLabel');
        const lowercaseLabel = document.getElementById('lowercaseLabel');
        const symbolsLabel = document.getElementById('symbolsLabel');
        const japaneseLabel = document.getElementById('japaneseLabel');
        const chineseLabel = document.getElementById('chineseLabel');
        const generateBtn = document.getElementById('generateBtn');
        const copyBtn = document.getElementById('copyBtn');
        const themeText = document.getElementById('themeText');
        const uploadText = document.getElementById('uploadText');
        const toast = document.getElementById('toast');
        const passwordInput = document.getElementById('password');
        const lengthSlider = document.getElementById('length');
        const lengthValue = document.getElementById('lengthValue');
        const themeToggle = document.getElementById('themeToggle');
        const bgInput = document.getElementById('bg-input');
        
        // 字符库
        const charSets = {
            numbers: '0123456789',
            uppercase: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
            lowercase: 'abcdefghijklmnopqrstuvwxyz',
            symbols: '!@#$%^&*()_+-=[]{}|;:,.<>?',
            japanese: 'あいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれろわをんカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン',
            chinese: '的一是了我不人在他有这个上们来到时大地为子中你说生国年着就那和要她出也得里后自以会家可下而过天去能对小多然于心学么之都好看起发当没成只如事把还用第样道想作种开美总从无面最女但现前些所同日手又行意动方期它头经长儿回位分爱老因很给名法间斯知世什两次使身者被高已亲其进此话常与活正感'
        };

        // 当前语言
        let currentLang = 'zh';

        // 切换语言
        langBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                langBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentLang = btn.dataset.lang;
                updateTranslations();
            });
        });

        // 更新多语言文本
        function updateTranslations() {
            const t = translations[currentLang];
            title.textContent = t.title;
            lengthLabel.textContent = t.lengthLabel;
            numbersLabel.textContent = t.numbersLabel;
            uppercaseLabel.textContent = t.uppercaseLabel;
            lowercaseLabel.textContent = t.lowercaseLabel;
            symbolsLabel.textContent = t.symbolsLabel;
            japaneseLabel.textContent = t.japaneseLabel;
            chineseLabel.textContent = t.chineseLabel;
            generateBtn.textContent = t.generateBtn;
            copyBtn.textContent = t.copyBtn;
            themeText.textContent = t.themeText;
            uploadText.textContent = t.uploadText;
        }

        // 长度滑块同步
        lengthSlider.addEventListener('input', () => {
            lengthValue.textContent = lengthSlider.value;
        });

        // 生成密码
        generateBtn.addEventListener('click', generatePassword);

        function generatePassword() {
            // 获取选中的字符类型
            const selectedTypes = [];
            if (document.getElementById('numbers').checked) selectedTypes.push('numbers');
            if (document.getElementById('uppercase').checked) selectedTypes.push('uppercase');
            if (document.getElementById('lowercase').checked) selectedTypes.push('lowercase');
            if (document.getElementById('symbols').checked) selectedTypes.push('symbols');
            if (document.getElementById('japanese').checked) selectedTypes.push('japanese');
            if (document.getElementById('chinese').checked) selectedTypes.push('chinese');

            // 验证至少选择一种类型
            if (selectedTypes.length === 0) {
                showToast(translations[currentLang].noOptions);
                return;
            }

            // 拼接字符库
            let charPool = '';
            selectedTypes.forEach(type => {
                charPool += charSets[type];
            });

            // 生成密码
            const length = parseInt(lengthSlider.value);
            let password = '';
            for (let i = 0; i < length; i++) {
                const randomIndex = Math.floor(Math.random() * charPool.length);
                password += charPool[randomIndex];
            }

            // 显示密码
            passwordInput.value = password;
            
            // 密码框动画
            passwordInput.style.transform = 'scale(1.02)';
            setTimeout(() => {
                passwordInput.style.transform = 'scale(1)';
            }, 300);
        }

        // 复制密码
        copyBtn.addEventListener('click', copyPassword);

        function copyPassword() {
            if (!passwordInput.value) return;
            
            try {
                navigator.clipboard.writeText(passwordInput.value);
                showToast(translations[currentLang].copySuccess);
                
                // 复制按钮动画
                copyBtn.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    copyBtn.style.transform = 'scale(1)';
                }, 200);
            } catch (err) {
                showToast(translations[currentLang].copyFailed);
            }
        }

        // 显示提示框
        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // 切换暗黑模式
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
        });

        // 上传背景
        bgInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    document.body.style.backgroundImage = `url(${event.target.result})`;
                };
                reader.readAsDataURL(file);
            }
        });

        // 初始化生成一个密码
        generatePassword();
    </script>
</body>
</html>
