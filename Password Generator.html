<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密码生成器</title>
    <style>
        /* 基础样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --bg-color: #ffffff;
            --card-bg: #f8f9fa;
            --text-color: #333333;
            --accent-color: #4a6cf7;
            --border-color: #e0e0e0;
            --button-hover: #3a5ce7;
            --toggle-bg: #e9ecef;
            --toggle-circle: #ffffff;
        }

        .dark-mode {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #5a7cff;
            --border-color: #333333;
            --button-hover: #4a6cf7;
            --toggle-bg: #333333;
            --toggle-circle: #e0e0e0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: background-color 0.3s ease, color 0.3s ease;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            color: var(--accent-color);
            font-size: 24px;
        }

        /* 模式切换按钮 */
        .mode-toggle {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 30px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--toggle-bg);
            transition: .4s;
            border-radius: 30px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 4px;
            bottom: 4px;
            background-color: var(--toggle-circle);
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--accent-color);
        }

        input:checked + .slider:before {
            transform: translateX(30px);
        }

        /* 密码显示区域 */
        .password-display {
            position: relative;
            margin-bottom: 20px;
        }

        #password {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--bg-color);
            color: var(--text-color);
            outline: none;
            transition: border-color 0.3s ease;
        }

        #password:focus {
            border-color: var(--accent-color);
        }

        .copy-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 8px 12px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .copy-btn:hover {
            background-color: var(--button-hover);
        }

        /* 密码长度控制 */
        .length-control {
            margin-bottom: 20px;
        }

        .length-control label {
            display: block;
            margin-bottom: 8px;
            font-size: 16px;
        }

        .length-slider {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #length {
            flex: 1;
            height: 8px;
            background-color: var(--toggle-bg);
            border-radius: 4px;
            outline: none;
            -webkit-appearance: none;
        }

        #length::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--accent-color);
            cursor: pointer;
        }

        #length-value {
            min-width: 40px;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
        }

        /* 字符类型选择 */
        .character-options {
            margin-bottom: 25px;
        }

        .character-options h3 {
            margin-bottom: 10px;
            font-size: 16px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .option-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--accent-color);
            cursor: pointer;
        }

        /* 生成按钮 */
        .generate-btn {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .generate-btn:hover {
            background-color: var(--button-hover);
        }

        /* 提示信息 */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #4CAF50;
            color: white;
            padding: 12px 20px;
            border-radius: 6px;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>密码生成器</h1>
        
        <!-- 模式切换 -->
        <div class="mode-toggle">
            <label class="toggle-switch">
                <input type="checkbox" id="mode-switch">
                <span class="slider"></span>
            </label>
        </div>

        <!-- 密码显示 -->
        <div class="password-display">
            <input type="text" id="password" readonly placeholder="点击生成密码">
            <button class="copy-btn" id="copy-btn">复制</button>
        </div>

        <!-- 密码长度控制 -->
        <div class="length-control">
            <label for="length">密码长度:</label>
            <div class="length-slider">
                <input type="range" id="length" min="2" max="32" value="16">
                <span id="length-value">16</span>
            </div>
        </div>

        <!-- 字符类型选择 -->
        <div class="character-options">
            <h3>包含字符类型:</h3>
            <div class="options-grid">
                <div class="option-item">
                    <input type="checkbox" id="uppercase" checked>
                    <label for="uppercase">大写字母 (A-Z)</label>
                </div>
                <div class="option-item">
                    <input type="checkbox" id="lowercase" checked>
                    <label for="lowercase">小写字母 (a-z)</label>
                </div>
                <div class="option-item">
                    <input type="checkbox" id="numbers" checked>
                    <label for="numbers">数字 (0-9)</label>
                </div>
                <div class="option-item">
                    <input type="checkbox" id="symbols" checked>
                    <label for="symbols">特殊符号 (!@#$%^&*)</label>
                </div>
            </div>
        </div>

        <!-- 生成按钮 -->
        <button class="generate-btn" id="generate-btn">生成密码</button>
    </div>

    <!-- 提示框 -->
    <div class="toast" id="toast">已复制到剪贴板</div>

    <script>
        // 获取DOM元素
        const modeSwitch = document.getElementById('mode-switch');
        const lengthSlider = document.getElementById('length');
        const lengthValue = document.getElementById('length-value');
        const generateBtn = document.getElementById('generate-btn');
        const passwordInput = document.getElementById('password');
        const copyBtn = document.getElementById('copy-btn');
        const toast = document.getElementById('toast');
        
        // 字符集定义
        const characterSets = {
            uppercase: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
            lowercase: 'abcdefghijklmnopqrstuvwxyz',
            numbers: '0123456789',
            symbols: '!@#$%^&*()_+-=[]{}|;:,.<>?`~'
        };

        // 切换深色/浅色模式
        modeSwitch.addEventListener('change', function() {
            document.body.classList.toggle('dark-mode');
            // 保存模式偏好到本地存储
            localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
        });

        // 初始化模式（从本地存储读取）
        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark-mode');
            modeSwitch.checked = true;
        }

        // 更新密码长度显示
        lengthSlider.addEventListener('input', function() {
            lengthValue.textContent = this.value;
        });

        // 生成密码函数
        function generatePassword() {
            const length = parseInt(lengthSlider.value);
            let selectedChars = '';
            let password = '';

            // 收集选中的字符类型
            if (document.getElementById('uppercase').checked) selectedChars += characterSets.uppercase;
            if (document.getElementById('lowercase').checked) selectedChars += characterSets.lowercase;
            if (document.getElementById('numbers').checked) selectedChars += characterSets.numbers;
            if (document.getElementById('symbols').checked) selectedChars += characterSets.symbols;

            // 至少选择一种字符类型
            if (selectedChars === '') {
                alert('请至少选择一种字符类型！');
                return;
            }

            // 生成随机密码
            for (let i = 0; i < length; i++) {
                const randomIndex = Math.floor(Math.random() * selectedChars.length);
                password += selectedChars[randomIndex];
            }

            // 显示密码
            passwordInput.value = password;
        }

        // 复制密码到剪贴板
        function copyPassword() {
            if (passwordInput.value === '') {
                alert('请先生成密码！');
                return;
            }
            
            passwordInput.select();
            navigator.clipboard.writeText(passwordInput.value).then(() => {
                // 显示提示
                toast.classList.add('show');
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 2000);
            }).catch(err => {
                alert('复制失败：' + err);
            });
        }
        generateBtn.addEventListener('click', generatePassword);
        copyBtn.addEventListener('click', copyPassword);
        window.addEventListener('load', generatePassword);
    </script>
</body>
</html>
