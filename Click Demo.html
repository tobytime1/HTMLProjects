<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click</title>
    <style>
        :root {
            --bg: #f0f0f0;
            --text: #222;
            --accent: #000;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg); color: var(--text);
            overflow: hidden; user-select: none;
        }
        /* 背景文字系统 */
        #narration-container {
            position: absolute; width: 100%; height: 100%;
            padding: 20px; box-sizing: border-box;
            display: flex; flex-direction: column-reverse;
            overflow-y: auto; z-index: 1; pointer-events: none;
            scrollbar-width: thin;
        }
        #narration-container::-webkit-scrollbar { width: 5px; }
        .log-entry {
            font-size: 2.5rem; font-weight: 800; opacity: 0;
            transform: translateY(20px); transition: 0.5s;
            margin-bottom: 10px; color: rgba(0,0,0,0.05);
            pointer-events: auto;
        }
        .log-entry.active { opacity: 1; transform: translateY(0); color: rgba(0,0,0,0.15); }
        .log-entry:hover { color: rgba(0,0,0,0.4); }

        /* 中心按钮 */
        #main-btn {
            position: absolute; left: 50%; top: 50%;
            transform: translate(-50%, -50%);
            padding: 40px 80px; font-size: 1.5rem; font-weight: bold;
            background: #fff; border: 4px solid var(--accent);
            cursor: pointer; z-index: 10; transition: all 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 10px 10px 0px #000;
        }
        #main-btn:active { transform: translate(-48%, -48%); box-shadow: 2px 2px 0px #000; }
        #main-btn:hover { background: #000; color: #fff; }

        /* UI面板 */
        .ui-panel { position: absolute; z-index: 100; padding: 20px; }
        .top-left { top: 0; left: 0; display: flex; gap: 10px; }
        .top-right { top: 0; right: 0; text-align: right; }
        button.ui-btn {
            background: none; border: 2px solid #000; padding: 5px 15px;
            cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        button.ui-btn:hover { background: #000; color: #fff; }

        /* 成就弹窗 */
        #achievements-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
            width: 80%; height: 70%; background: #fff; border: 5px solid #000;
            z-index: 1000; display: none; flex-direction: column; padding: 20px;
        }
        #achievements-modal.show { display: flex; animation: pop 0.3s forwards; }
        .ach-list { overflow-y: auto; flex-grow: 1; border-top: 2px solid #eee; }
        .ach-item { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        .ach-item.locked { color: #ccc; filter: blur(1px); }
        .ach-item.unlocked { color: #000; font-weight: bold; background: #f9f9f9; }

        @keyframes pop { to { transform: translate(-50%, -50%) scale(1); } }
    </style>
</head>
<body>

    // --- 核心逻辑 ---

    function addLog(text) {
        const container = document.getElementById('narration-container');
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.innerText = text;
        container.prepend(entry);
        setTimeout(() => entry.classList.add('active'), 50);
        // 自动清理旧日志保持性能
        if(container.childNodes.length > 50) container.removeChild(container.lastChild);
    }

    function unlock(id) {
        if (STATE.achievements[id]) return;
        STATE.achievements[id] = true;
        const ach = ACH_LIST.find(a => a.id === id);
        addLog(`【成就达成：${ach.name}】`);
        updateUI();
        if(Object.keys(STATE.achievements).length === 99) unlock('ending');
    }

    function updateUI() {
        const count = Object.keys(STATE.achievements).length;
        const percent = Math.floor((count / ACH_LIST.length) * 100);
        document.getElementById('completion').innerText = `进度: ${percent}%`;
        
        const list = document.getElementById('ach-list');
        list.innerHTML = '';
        ACH_LIST.forEach(ach => {
            const div = document.createElement('div');
            div.className = `ach-item ${STATE.achievements[ach.id] ? 'unlocked' : 'locked'}`;
            div.innerHTML = `<span>${ach.name}</span><span>${ach.desc}</span>`;
            list.appendChild(div);
        });
    }

    // --- 加密系统 ---
    function encrypt(data) {
        const str = JSON.stringify(data);
        return btoa(str.split('').map(c => String.fromCharCode(c.charCodeAt(0) + 3)).join(''));
    }

    function decrypt(str) {
        try {
            const decoded = atob(str);
            return JSON.parse(decoded.split('').map(c => String.fromCharCode(c.charCodeAt(0) - 3)).join(''));
        } catch(e) { return null; }
    }

    // --- 存档功能 ---
    function saveGame() {
        STATE.saveCount++;
        const now = Date.now();
        if(now - STATE.lastSaveTime < 60000 && STATE.saveCount >= 3) unlock('candangpi');
        STATE.lastSaveTime = now;
        unlock('save1');
        if(STATE.saveCount >= 5) unlock('save5');

        const data = encrypt(STATE);
        const blob = new Blob([data], {type: 'text/plain'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `save_${new Date().getTime()}.clk`;
        a.click();
    }

    function importTrigger() {
        document.getElementById('fileInput').click();
    }

    function loadGame(input) {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = function() {
            const data = decrypt(reader.result);
            if(data) {
                Object.assign(STATE, data);
                const now = Date.now();
                if(now - STATE.lastImportTime < 10000) unlock('houhuiyao');
                STATE.lastImportTime = now;
                unlock('import1');
                updateUI();
                addLog("成功载入存档...");
            }
        };
        reader.readAsText(file);
    }

    function toggleAchievements() {
        const modal = document.getElementById('achievements-modal');
        const isOpening = !modal.classList.contains('show');
        modal.classList.toggle('show');
        STATE.modalToggleTime = Date.now();
        if(!isOpening && (Date.now() - STATE.modalToggleTime < 1000)) unlock('shierbujian');
        updateUI();
    }

    // --- 动作检测 ---
    const btn = document.getElementById('main-btn');
    let lastX = 0, lastY = 0;

    window.addEventListener('mousemove', (e) => {
        const dist = Math.sqrt((e.clientX - lastX)**2 + (e.clientY - lastY)**2);
        STATE.moveDistance += dist;
        
        // 瞬间极速
        if(dist > 500) unlock('speed5000');
        
        // 地震模拟
        if(!window.moveLog) window.moveLog = [];
        window.moveLog.push({t: Date.now(), d: dist});
        const oneSecDist = window.moveLog.filter(m => m.t > Date.now() - 1000).reduce((a,b)=>a+b.d, 0);
        if(oneSecDist > 1000) unlock('dizhen');

        // 社交距离
        const bRect = btn.getBoundingClientRect();
        const bX = bRect.left + bRect.width/2;
        const bY = bRect.top + bRect.height/2;
        const distToBtn = Math.sqrt((e.clientX - bX)**2 + (e.clientY - bY)**2);
        if(distToBtn > 200) {
            STATE.awayTime = (STATE.awayTime || 0) + 1;
            if(STATE.awayTime > 500) unlock('shejiaojuli');
        }

        // 随机话语
        if(Math.random() < 0.005) addLog(PHRASES[Math.floor(Math.random()*PHRASES.length)]);

        // 移动成就
        if(STATE.moveDistance > 500) unlock('move500');
        if(STATE.moveDistance > 5000) unlock('move5000');
        if(STATE.moveDistance > 50000) unlock('move50000');

        lastX = e.clientX;
        lastY = e.clientY;
    });

    btn.addEventListener('mouseenter', () => {
        STATE.hoverStart = Date.now();
        STATE.isHovering = true;
    });

    btn.addEventListener('mouseleave', () => {
        if(Date.now() - STATE.hoverStart < 100) unlock('fakeout');
        STATE.isHovering = false;
    });

    btn.addEventListener('click', (e) => {
        STATE.clicks++;
        const now = Date.now();
        
        // 连击检测
        if(!window.clickLog) window.clickLog = [];
        window.clickLog.push(now);
        const combos = window.clickLog.filter(t => t > now - 1000).length;
        if(combos >= 5) unlock('combo5');
        if(combos >= 6) unlock('combo6');
        if(combos >= 8) unlock('combo8');

        // 节拍器
        const gap = now - STATE.lastClickTime;
        if(Math.abs(gap - 1000) < 100) {
            STATE.clickStreak++;
            if(STATE.clickStreak >= 10) unlock('jiepaiqi');
        } else { STATE.clickStreak = 0; }

        // 边缘检测
        const rect = btn.getBoundingClientRect();
        if(e.clientX <= rect.left+5 || e.clientX >= rect.right-5 || e.clientY <= rect.top+5 || e.clientY >= rect.bottom-5) {
            unlock('bianyuanxingzhe');
        }

        // 累计点击
        if(STATE.clicks >= 2) unlock('c2');
        if(STATE.clicks >= 20) unlock('c20');
        if(STATE.clicks >= 50) unlock('c50');
        if(STATE.clicks >= 500) unlock('c500');
        if(STATE.clicks === 100) {
            setTimeout(() => { if(Date.now() - STATE.lastClickTime > 10000) unlock('perfect100') }, 10500);
        }

        // 特殊
        if(e.shiftKey || e.ctrlKey) unlock('unfair');

        STATE.lastClickTime = now;
    });

    window.addEventListener('mousedown', (e) => {
        if(e.button === 1) unlock('midclick');
        if(e.target !== btn && e.target.tagName !== 'BUTTON') {
            STATE.missClicks++;
            if(STATE.missClicks >= 2) unlock('miss2');
            if(STATE.missClicks >= 10) unlock('miss10');
        }
    });

    window.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        unlock('jujuewenwen');
        if(!window.rcLog) window.rcLog = [];
        window.rcLog.push(Date.now());
        if(window.rcLog.filter(t => t > Date.now()-1000).length >= 4) unlock('baolichaijie');
    });

    window.addEventListener('keydown', (e) => {
        if(e.key === '?') unlock('ganhenme');
        if(e.ctrlKey && e.key === 'p') { e.preventDefault(); unlock('print'); }
        if(e.ctrlKey && e.key === 'a') unlock('selectall');
    });

    window.addEventListener('resize', () => {
        STATE.windowResizes++;
        unlock('win1');
        if(STATE.windowResizes >= 5) unlock('win5');
        if(window.innerWidth < 300) unlock('youbikongju');
    });

    // 轮询检测
    setInterval(() => {
        const now = Date.now();
        // 停留时间
        const elapsed = (now - STATE.startTime) / 1000;
        if(elapsed > 60) unlock('stay60');
        if(elapsed > 3600) unlock('stay3600');

        // 悬停成就
        if(STATE.isHovering) {
            const h = (now - STATE.hoverStart) / 1000;
            if(h > 1) unlock('hover1');
            if(h > 5) unlock('hover5');
            if(h > 10) unlock('yuyubujue');
            if(h > 20) unlock('hover20');
        }

        // 时间成就
        const hour = new Date().getHours();
        if(hour >= 2 && hour <= 4) unlock('yemiaozi');
        if(hour >= 5 && hour <= 7) unlock('zaoqiniao');

        // 环境检测
        if(navigator.language !== 'zh-CN') unlock('duoyuyanzhe');
        if(window.fullScreen || window.innerHeight === screen.height) unlock('jumuyingyuan');
        
    }, 1000);

    // 初始化
    updateUI();
    addLog("系统已就绪。点击、移动、或者...随便你做什么。");

</script>
</body>
</html>
