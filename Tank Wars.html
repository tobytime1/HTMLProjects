<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>2D 坦克/射击对战 - 极致对决</title>
    <style>
        body { margin: 0; overflow: hidden; background: #222; font-family: "Microsoft YaHei", sans-serif; color: white; user-select: none; }
        canvas { display: block; background: #333; margin: auto; }
        
        /* UI 界面样式 */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); z-index: 10; }
        .menu-panel { background: #444; padding: 30px; border-radius: 15px; border: 4px solid #666; text-align: center; max-width: 800px; }
        h1 { color: #ffeb3b; text-shadow: 2px 2px #000; }
        .flex-row { display: flex; gap: 20px; margin: 20px 0; }
        .selection-box { border: 2px solid #888; padding: 10px; flex: 1; }
        select, button { padding: 10px; font-size: 16px; cursor: pointer; background: #eee; border: none; border-radius: 5px; }
        button:hover { background: #ffeb3b; }
        .controls-hint { font-size: 12px; color: #ccc; margin-top: 10px; }
        
        /* 游戏内 UI */
        #game-info { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-between; padding: 0 50px; box-sizing: border-box; pointer-events: none; z-index: 5; }
        .p-status { background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; border-left: 5px solid red; }
        .p2-status { border-left: none; border-right: 5px solid blue; text-align: right; }
    </style>
</head>
<body>

<div id="game-info" style="display:none;">
    <div id="p1-hud" class="p-status">
        P1 [红色] | 血量: <span id="p1-hp">100</span><br>
        武器: <span id="p1-wpn">-</span> | 弹药: <span id="p1-ammo">-</span>
    </div>
    <div id="p2-hud" class="p-status p2-status">
        P2 [蓝色] | 血量: <span id="p2-hp">100</span><br>
        武器: <span id="p2-wpn">-</span> | 弹药: <span id="p2-ammo">-</span>
    </div>
</div>

<div id="ui-layer">
    <div class="menu-panel" id="start-menu">
        <h1>2D 战术射击对战</h1>
        
        <div class="flex-row">
            <!-- P1 选择 -->
            <div class="selection-box">
                <h3>玩家 1 (WSAD+G)</h3>
                <label>角色颜色：</label>
                <select id="p1-color">
                    <option value="#ff4444">热血红</option>
                    <option value="#ff8800">活力橙</option>
                    <option value="#ff00ff">魅惑粉</option>
                </select><br><br>
                <label>选择武器：</label>
                <select id="p1-weapon-select"></select>
            </div>

            <!-- P2 选择 -->
            <div class="selection-box">
                <h3>玩家 2 (↑↓←→+M)</h3>
                <label>角色颜色：</label>
                <select id="p2-color">
                    <option value="#4444ff">深邃蓝</option>
                    <option value="#00ffff">青空蓝</option>
                    <option value="#44ff44">森林绿</option>
                </select><br><br>
                <label>选择武器：</label>
                <select id="p2-weapon-select"></select>
            </div>
        </div>

        <div class="selection-box">
            <h3>选择战场地形</h3>
            <select id="map-select">
                <option value="0">荒芜之地 (平坦)</option>
                <option value="1">十字峡谷 (中心障碍)</option>
                <option value="2">石阵阵地 (随机分布)</option>
                <option value="3">狭路相逢 (中间长墙)</option>
                <option value="4">四角堡垒 (防御据点)</option>
                <option value="5">掩体矩阵 (小块掩体)</option>
                <option value="6">终极迷宫 (复杂)</option>
            </select>
        </div>

        <br>
        <button onclick="startGame()" style="width: 200px; height: 50px; font-weight: bold;">开始战斗</button>
        
        <div class="controls-hint">
            P1: W/S 前后, A/D 旋转, G 射击 | P2: 方向键 移动/旋转, M 射击<br>
            *弹药耗尽会自动花1-3秒时间换弹*
        </div>
    </div>

    <div id="game-over" class="menu-panel" style="display:none;">
        <h2 id="winner-text">P1 获胜!</h2>
        <button onclick="location.reload()">返回菜单</button>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<!-- 背景音乐控制 (由于浏览器限制，需点击后播放) -->
<audio id="bgm" loop>
    <source src="https://actions.google.com/sounds/v1/ambient/dark_sci_fi_drone.ogg" type="audio/ogg">
</audio>

<script>
/** 游戏配置 **/
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

canvas.width = 1000;
canvas.height = 700;

// 武器库配置
const WEAPONS = {
    "Pistol": { name: "手枪", dmg: 15, range: 400, speed: 7, fireRate: 400, clip: 12, reload: 1000, color: '#fff' },
    "Rifle":  { name: "步枪", dmg: 20, range: 600, speed: 10, fireRate: 150, clip: 30, reload: 2000, color: '#0f0' },
    "Shotgun":{ name: "散弹枪", dmg: 40, range: 250, speed: 6, fireRate: 800, clip: 5, reload: 2500, color: '#ff0' },
    "Sniper": { name: "狙击枪", dmg: 80, range: 900, speed: 18, fireRate: 1500, clip: 3, reload: 3000, color: '#f0f' },
    "SMG":    { name: "冲锋枪", dmg: 10, range: 350, speed: 8, fireRate: 80, clip: 45, reload: 1500, color: '#0ff' },
    "MG":     { name: "机枪", dmg: 18, range: 550, speed: 9, fireRate: 100, clip: 100, reload: 5000, color: '#fa0' }
};

// 初始化武器选择下拉框
function initWeaponSelect() {
    const p1s = document.getElementById('p1-weapon-select');
    const p2s = document.getElementById('p2-weapon-select');
    for(let key in WEAPONS) {
        let opt = `<option value="${key}">${WEAPONS[key].name} (伤:${WEAPONS[key].dmg} 弹:${WEAPONS[key].clip})</option>`;
        p1s.innerHTML += opt;
        p2s.innerHTML += opt;
    }
}
initWeaponSelect();

/** 游戏逻辑变量 **/
let players = [];
let bullets = [];
let obstacles = [];
let gameRunning = false;
let keys = {};

window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

class Player {
    constructor(id, x, y, angle, color, weaponKey) {
        this.id = id;
        this.x = x;
        this.y = y;
        this.angle = angle;
        this.color = color;
        this.radius = 20;
        this.hp = 100;
        this.speed = 3;
        this.rotSpeed = 0.05;
        
        this.weapon = JSON.parse(JSON.stringify(WEAPONS[weaponKey])); // 深拷贝武器属性
        this.ammo = this.weapon.clip;
        this.isReloading = false;
        this.lastShot = 0;
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);
        
        // 画身体
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "white";
        ctx.lineWidth = 2;
        ctx.stroke();

        // 画炮筒/枪管
        ctx.fillStyle = "#333";
        ctx.fillRect(this.radius - 5, -5, 20, 10);
        
        // 换弹提示
        if(this.isReloading) {
            ctx.fillStyle = "yellow";
            ctx.font = "12px Arial";
            ctx.fillText("RELOADING...", -30, -30);
        }
        
        ctx.restore();
    }

    update() {
        if(this.hp <= 0) return;

        let moveDir = 0;
        // P1 控制
        if(this.id === 1) {
            if(keys['KeyW']) moveDir = 1;
            if(keys['KeyS']) moveDir = -1;
            if(keys['KeyA']) this.angle -= this.rotSpeed;
            if(keys['KeyD']) this.angle += this.rotSpeed;
            if(keys['KeyG']) this.shoot();
        } 
        // P2 控制
        else {
            if(keys['ArrowUp']) moveDir = 1;
            if(keys['ArrowDown']) moveDir = -1;
            if(keys['ArrowLeft']) this.angle -= this.rotSpeed;
            if(keys['ArrowRight']) this.angle += this.rotSpeed;
            if(keys['KeyM']) this.shoot();
        }

        if(moveDir !== 0) {
            let nextX = this.x + Math.cos(this.angle) * this.speed * moveDir;
            let nextY = this.y + Math.sin(this.angle) * this.speed * moveDir;
            
            // 碰撞检测 (边界 + 障碍物)
            if(!checkWallCollision(nextX, nextY, this.radius)) {
                this.x = Math.max(this.radius, Math.min(canvas.width - this.radius, nextX));
                this.y = Math.max(this.radius, Math.min(canvas.height - this.radius, nextY));
            }
        }
    }

    shoot() {
        const now = Date.now();
        if(this.isReloading || now - this.lastShot < this.weapon.fireRate) return;

        if(this.ammo <= 0) {
            this.reload();
            return;
        }

        // 发射子弹
        bullets.push({
            x: this.x + Math.cos(this.angle) * 25,
            y: this.y + Math.sin(this.angle) * 25,
            vx: Math.cos(this.angle) * this.weapon.speed,
            vy: Math.sin(this.angle) * this.weapon.speed,
            range: this.weapon.range,
            dist: 0,
            dmg: this.weapon.dmg,
            owner: this.id,
            color: this.weapon.color
        });

        this.ammo--;
        this.lastShot = now;
        
        if(this.ammo <= 0) this.reload();
    }

    reload() {
        if(this.isReloading) return;
        this.isReloading = true;
        setTimeout(() => {
            this.ammo = this.weapon.clip;
            this.isReloading = false;
        }, this.weapon.reload);
    }
}

/** 地形系统 **/
function createMap(type) {
    obstacles = [];
    const w = canvas.width;
    const h = canvas.height;
    
    switch(parseInt(type)) {
        case 1: // 十字
            obstacles.push({x: w/2-100, y: h/2-20, w: 200, h: 40});
            obstacles.push({x: w/2-20, y: h/2-100, w: 40, h: 200});
            break;
        case 2: // 石阵
            for(let i=0; i<10; i++) 
                obstacles.push({x: Math.random()*(w-200)+100, y: Math.random()*(h-200)+100, w: 40, h: 40});
            break;
        case 3: // 狭路
            obstacles.push({x: 200, y: h/2-10, w: 600, h: 20});
            break;
        case 4: // 四角
            obstacles.push({x: 200, y: 150, w: 100, h: 100}, {x: 700, y: 150, w: 100, h: 100},
                           {x: 200, y: 450, w: 100, h: 100}, {x: 700, y: 450, w: 100, h: 100});
            break;
        case 5: // 矩阵
            for(let i=1; i<4; i++) for(let j=1; j<3; j++)
                obstacles.push({x: i*250-20, y: j*230-20, w: 40, h: 40});
            break;
        case 6: // 迷宫
            obstacles.push({x: 150, y: 0, w: 20, h: 500}, {x: 350, y: 200, w: 20, h: 500},
                           {x: 550, y: 0, w: 20, h: 500}, {x: 750, y: 200, w: 20, h: 500});
            break;
    }
}

function checkWallCollision(x, y, r) {
    for(let ob of obstacles) {
        if(x + r > ob.x && x - r < ob.x + ob.w && y + r > ob.y && y - r < ob.y + ob.h) return true;
    }
    return false;
}

/** 核心循环 **/
function startGame() {
    const p1w = document.getElementById('p1-weapon-select').value;
    const p2w = document.getElementById('p2-weapon-select').value;
    const p1c = document.getElementById('p1-color').value;
    const p2c = document.getElementById('p2-color').value;
    const mapT = document.getElementById('map-select').value;

    players = [
        new Player(1, 100, 350, 0, p1c, p1w),
        new Player(2, 900, 350, Math.PI, p2c, p2w)
    ];
    bullets = [];
    createMap(mapT);

    document.getElementById('ui-layer').style.display = 'none';
    document.getElementById('game-info').style.display = 'flex';
    document.getElementById('bgm').play().catch(()=>'');
    gameRunning = true;
    requestAnimationFrame(update);
}

function update() {
    if(!gameRunning) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 绘制障碍物
    ctx.fillStyle = "#555";
    for(let ob of obstacles) {
        ctx.fillRect(ob.x, ob.y, ob.w, ob.h);
        ctx.strokeStyle = "#888";
        ctx.strokeRect(ob.x, ob.y, ob.w, ob.h);
    }

    // 更新和绘制玩家
    players.forEach(p => {
        p.update();
        p.draw();
    });

    // 更新子弹
    for(let i = bullets.length-1; i >= 0; i--) {
        let b = bullets[i];
        b.x += b.vx;
        b.y += b.vy;
        b.dist += Math.sqrt(b.vx**2 + b.vy**2);

        // 绘制子弹
        ctx.fillStyle = b.color;
        ctx.beginPath();
        ctx.arc(b.x, b.y, 3, 0, Math.PI*2);
        ctx.fill();

        // 碰撞检测：墙壁
        let hitWall = false;
        for(let ob of obstacles) {
            if(b.x > ob.x && b.x < ob.x + ob.w && b.y > ob.y && b.y < ob.y + ob.h) {
                hitWall = true; break;
            }
        }

        // 碰撞检测：玩家
        let hitPlayer = false;
        players.forEach(p => {
            if(b.owner !== p.id) {
                let d = Math.hypot(b.x - p.x, b.y - p.y);
                if(d < p.radius) {
                    p.hp -= b.dmg;
                    hitPlayer = true;
                }
            }
        });

        if(hitWall || hitPlayer || b.dist > b.range || b.x<0 || b.x>canvas.width || b.y<0 || b.y>canvas.height) {
            bullets.splice(i, 1);
        }
    }

    // 更新 HUD
    updateHUD();

    // 检查胜负
    if(players[0].hp <= 0 || players[1].hp <= 0) {
        endGame(players[0].hp <= 0 ? "P2 (蓝色方) 获胜!" : "P1 (红色方) 获胜!");
    } else {
        requestAnimationFrame(update);
    }
}

function updateHUD() {
    document.getElementById('p1-hp').innerText = Math.max(0, players[0].hp);
    document.getElementById('p1-wpn').innerText = players[0].weapon.name;
    document.getElementById('p1-ammo').innerText = players[0].isReloading ? "换弹中..." : players[0].ammo;

    document.getElementById('p2-hp').innerText = Math.max(0, players[1].hp);
    document.getElementById('p2-wpn').innerText = players[1].weapon.name;
    document.getElementById('p2-ammo').innerText = players[1].isReloading ? "换弹中..." : players[1].ammo;
}

function endGame(msg) {
    gameRunning = false;
    document.getElementById('ui-layer').style.display = 'flex';
    document.getElementById('start-menu').style.display = 'none';
    document.getElementById('game-over').style.display = 'block';
    document.getElementById('winner-text').innerText = msg;
}
</script>

</body>
</html>
