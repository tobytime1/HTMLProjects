<!DOCTYPE html>
<html lang="zh" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人主页 | Portfolio</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 AOS 滚动动画库 -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <!-- 引入 Lucide 图标库 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        // Tailwind 主题配置
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0f172a',
                        darkCard: '#1e293b'
                    }
                }
            }
        }
    </script>
    
    <style>
        /* 平滑滚动 */
        html { scroll-behavior: smooth; }
        
        /* 自定义过渡动画 */
        .transition-theme {
            transition: background-color 0.5s, color 0.5s;
        }

        /* 渐变背景动画 */
        .hero-gradient {
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-darkBg dark:text-gray-100 transition-theme">

    <!-- 导航栏 -->
    <nav class="fixed w-full z-50 backdrop-blur-md bg-white/70 dark:bg-darkBg/70 border-b border-gray-200 dark:border-gray-800">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-500 to-purple-500">
                PORTFOLIO
            </div>
            
            <div class="flex items-center space-x-6">
                <!-- 导航链接 -->
                <div class="hidden md:flex space-x-6 font-medium">
                    <a href="#home" class="hover:text-blue-500" data-i18n="navHome">首页</a>
                    <a href="#about" class="hover:text-blue-500" data-i18n="navAbout">关于</a>
                    <a href="#projects" class="hover:text-blue-500" data-i18n="navProjects">项目</a>
                </div>

                <!-- 功能按钮 -->
                <div class="flex items-center space-x-3 border-l pl-6 border-gray-300 dark:border-gray-700">
                    <!-- 语言切换 -->
                    <button id="langToggle" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition" title="Switch Language">
                        <i data-lucide="languages" class="w-5 h-5"></i>
                    </button>
                    <!-- 主题切换 -->
                    <button id="themeToggle" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition">
                        <i data-lucide="sun" class="w-5 h-5 block dark:hidden"></i>
                        <i data-lucide="moon" class="w-5 h-5 hidden dark:block"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- 英雄区 (Hero Section) -->
    <section id="home" class="min-h-screen flex items-center justify-center pt-20">
        <div class="text-center px-4">
            <div class="mb-6 inline-block p-1 rounded-full bg-gradient-to-tr from-blue-500 to-purple-500 animate-bounce">
                <div class="bg-white dark:bg-darkBg rounded-full p-2">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="Avatar" class="w-24 h-24 rounded-full">
                </div>
            </div>
            <h1 class="text-5xl md:text-7xl font-extrabold mb-4" data-aos="fade-up">
                <span data-i18n="heroTitle">你好，我是</span> 
                <span class="text-blue-600 dark:text-blue-400">TobyTime</span>
            </h1>
            <p class="text-xl md:text-2xl text-gray-600 dark:text-gray-400 mb-8" data-aos="fade-up" data-aos-delay="200" data-i18n="heroSubtitle">
                HTML创作者
            </p>
            <div class="flex justify-center space-x-4" data-aos="fade-up" data-aos-delay="400">
                <a href="#projects" class="bg-blue-600 text-white px-8 py-3 rounded-full font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-500/30" data-i18n="viewWork">查看作品</a>
                <a href="#contact" class="border border-gray-300 dark:border-gray-600 px-8 py-3 rounded-full font-bold hover:bg-gray-100 dark:hover:bg-gray-800 transition" data-i18n="contactMe">联系我</a>
            </div>
        </div>
    </section>

    <!-- 关于我 (About Section) -->
    <section id="about" class="py-24 bg-white dark:bg-darkCard transition-theme">
        <div class="max-w-4xl mx-auto px-4">
            <h2 class="text-3xl font-bold mb-12 text-center" data-aos="fade-down" data-i18n="navAbout">关于我</h2>
            <div class="grid md:grid-cols-2 gap-12 items-center">
                <div data-aos="fade-right">
                    <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&w=600&q=80" alt="Work" class="rounded-2xl shadow-2xl">
                </div>
                <div space-y-6 data-aos="fade-left">
                    <h3 class="text-2xl font-semibold text-blue-500" data-i18n="aboutHeading">专业技能 & 愿景</h3>
                    <p class="text-gray-600 dark:text-gray-300 leading-relaxed" data-i18n="aboutP1">
                    I'm TobyTime
                    </p>
                    <div class="grid grid-cols-2 gap-4 pt-4">
                        <div class="p-4 bg-gray-50 dark:bg-darkBg rounded-xl">
                            <div class="text-blue-500 font-bold text-xl">0+</div>
                            <div class="text-sm" data-i18n="expYears">从业年限</div>
                        </div>
                        <div class="p-4 bg-gray-50 dark:bg-darkBg rounded-xl">
                            <div class="text-purple-500 font-bold text-xl">50+</div>
                            <div class="text-sm" data-i18n="expProjects">完成项目集</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 项目展示 (Projects Section) -->
    <section id="projects" class="py-24">
        <div class="max-w-6xl mx-auto px-4">
            <h2 class="text-3xl font-bold mb-16 text-center" data-aos="fade-down" data-i18n="navProjects">精选项目</h2>
            <div class="grid md:grid-cols-3 gap-8">
                <!-- 项目卡片 1 -->
                <div class="group bg-white dark:bg-darkCard rounded-2xl overflow-hidden shadow-lg hover:shadow-2xl transition-all duration-300 hover:-translate-y-2" data-aos="zoom-in">
                    <div class="h-48 overflow-hidden">
                        <img src="https://images.unsplash.com/photo-1460925895917-afdab827c52f?auto=format&fit=crop&w=500&q=60" alt="P1" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                    </div>
                    <div class="p-6">
                        <h3 class="text-xl font-bold mb-2">Unfinished</h3>
                        <p class="text-gray-500 dark:text-gray-400 text-sm mb-4">Unfinished</p>
                        <div class="flex flex-wrap gap-2">
                            <span class="px-3 py-1 bg-blue-100 dark:bg-blue-900 text-blue-600 dark:text-blue-300 text-xs rounded-full">React</span>
                            <span class="px-3 py-1 bg-green-100 dark:bg-green-900 text-green-600 dark:text-green-300 text-xs rounded-full">MongoDB</span>
                        </div>
                    </div>
                </div>

                <!-- 项目卡片 2 -->
                <div class="group bg-white dark:bg-darkCard rounded-2xl overflow-hidden shadow-lg hover:shadow-2xl transition-all duration-300 hover:-translate-y-2" data-aos="zoom-in" data-aos-delay="400">
                    <div class="h-48 overflow-hidden">
                        <img src="https://images.unsplash.com/photo-1522542550221-31fd19575a2d?auto=format&fit=crop&w=500&q=60" alt="P3" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                    </div>
                    <div class="p-6">
                        <h3 class="text-xl font-bold mb-2">Unfinished</h3>
                        <p class="text-gray-500 dark:text-gray-400 text-sm mb-4">Unfinished</p>
                        <div class="flex flex-wrap gap-2">
                            <span class="px-3 py-1 bg-pink-100 dark:bg-pink-900 text-pink-600 dark:text-pink-300 text-xs rounded-full">Next.js</span>
                            <span class="px-3 py-1 bg-yellow-100 dark:bg-yellow-900 text-yellow-600 dark:text-yellow-300 text-xs rounded-full">AI API</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="py-12 border-t border-gray-200 dark:border-gray-800 text-center">
        <p class="text-gray-500" data-i18n="footerText">© 2023 Alex. 基于 HTML/Tailwind/JS 打造.</p>
        <div class="flex justify-center space-x-6 mt-4 text-gray-400">
            <a href="#" class="hover:text-blue-500 transition"><i data-lucide="github"></i></a>
            <a href="#" class="hover:text-blue-500 transition"><i data-lucide="twitter"></i></a>
            <a href="#" class="hover:text-blue-500 transition"><i data-lucide="linkedin"></i></a>
        </div>
    </footer>

    <!-- JS 脚本 -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // 1. 初始化图标
        lucide.createIcons();

        // 2. 初始化滚动动画
        AOS.init({
            duration: 800,
            once: false,
            mirror: true
        });

        // 3. 多语言配置
        const i18n = {
            zh: {
                navHome: "首页",
                navAbout: "关于",
                navProjects: "项目",
                heroTitle: "你好，我是",
                heroSubtitle: "TobyTime",
                viewWork: "查看作品",
                contactMe: "联系我",
                aboutHeading: "业余HTML",
                aboutP1: "我以创作HTML作品为爱好。",
                expYears: "从业年限",
                expProjects: "完成项目集",
                footerText: "© 2023"
            },
            en: {
                navHome: "Home",
                navAbout: "About",
                navProjects: "Projects",
                heroTitle: "Hi, I'm",
                heroSubtitle: "TobyTime",
                viewWork: "View Work",
                contactMe: "Contact Me",
                aboutHeading: "Skills & Vision",
                aboutP1: "I enjoy making HTML project",
                expProjects: "Projects Done",
                footerText: "© 2023."
            }
        };

        let currentLang = 'zh';
        const langToggle = document.getElementById('langToggle');

        function updateLanguage() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                el.innerText = i18n[currentLang][key];
            });
            document.documentElement.lang = currentLang;
        }

        langToggle.addEventListener('click', () => {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            updateLanguage();
        });

        // 4. 黑夜模式切换
        const themeToggle = document.getElementById('themeToggle');
        const htmlElement = document.documentElement;

        // 检查本地存储
        if (localStorage.getItem('theme') === 'dark') {
            htmlElement.classList.add('dark');
        }

        themeToggle.addEventListener('click', () => {
            htmlElement.classList.toggle('dark');
            if (htmlElement.classList.contains('dark')) {
                localStorage.setItem('theme', 'dark');
            } else {
                localStorage.setItem('theme', 'light');
            }
        });

        // 5. 导航栏滚动阴影效果
        window.addEventListener('scroll', () => {
            const nav = document.querySelector('nav');
            if (window.scrollY > 50) {
                nav.classList.add('shadow-md');
            } else {
                nav.classList.remove('shadow-md');
            }
        });
    </script>
</body>
</html>
