<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Clock</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --container-bg: rgba(255, 255, 255, 0.8);
            --text-color: #333;
            --accent-color: #007AFF;
            --shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --container-bg: rgba(30, 30, 30, 0.8);
            --text-color: #ffffff;
            --accent-color: #0A84FF;
            --shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 3rem;
            border-radius: 30px;
            background: var(--container-bg);
            backdrop-filter: blur(10px);
            box-shadow: var(--shadow);
            width: 90%;
            max-width: 500px;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            margin-bottom: 2rem;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 8px 12px;
            border: none;
            border-radius: 8px;
            background: var(--bg-color);
            color: var(--text-color);
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        button:hover {
            background: var(--accent-color);
            color: white;
        }

        button.active {
            background: var(--accent-color);
            color: white;
        }

        #time {
            font-size: 5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            font-variant-numeric: tabular-nums;
            letter-spacing: -2px;
        }

        #date {
            font-size: 1.2rem;
            opacity: 0.8;
            margin-bottom: 0.2rem;
        }

        #day {
            font-size: 1.1rem;
            color: var(--accent-color);
            font-weight: 600;
        }

        .theme-toggle {
            font-size: 1.2rem;
            padding: 5px 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="controls">
        <div class="btn-group">
            <button onclick="setLang('zh')" id="btn-zh" class="active">CN</button>
            <button onclick="setLang('en')" id="btn-en">EN</button>
            <button onclick="setLang('ja')" id="btn-ja">JP</button>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()" id="theme-icon">🌙</button>
    </div>

    <div id="time">00:00:00</div>
    <div id="date">---- -- --</div>
    <div id="day">----</div>
</div>

<script>
    let currentLang = 'zh';
    let isDark = false;

    const i18n = {
        zh: {
            days: ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'],
            format: (y, m, d) => `${y}年${m}月${d}日`
        },
        en: {
            days: ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'],
            format: (y, m, d) => `${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][m-1]} ${d}, ${y}`
        },
        ja: {
            days: ['日曜日', '月曜日', '火曜日', '水曜日', '木曜日', '金曜日', '土曜日'],
            format: (y, m, d) => `${y}年${m}月${d}日`
        }
    };

    function updateClock() {
        const now = new Date();
        
        const h = String(now.getHours()).padStart(2, '0');
        const m = String(now.getMinutes()).padStart(2, '0');
        const s = String(now.getSeconds()).padStart(2, '0');
        document.getElementById('time').textContent = `${h}:${m}:${s}`;

        const year = now.getFullYear();
        const month = now.getMonth() + 1;
        const date = now.getDate();
        const dayIndex = now.getDay();

        document.getElementById('date').textContent = i18n[currentLang].format(year, month, date);
        document.getElementById('day').textContent = i18n[currentLang].days[dayIndex];
    }

    function setLang(lang) {
        currentLang = lang;
        document.querySelectorAll('.btn-group button').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`btn-${lang}`).classList.add('active');
        updateClock();
    }

    function toggleTheme() {
        isDark = !isDark;
        document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
        document.getElementById('theme-icon').textContent = isDark ? '☀️' : '🌙';
    }

    setInterval(updateClock, 1000);
    updateClock();
</script>

</body>
</html>
